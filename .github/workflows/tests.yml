name: tests

# Test the head of ANY pushed branch (and pull-request heads). The full `mvn test`
# suite is self-contained — the SSH-adapter test runs an in-JVM Apache MINA sshd, so
# no Docker/service containers are needed.
on:
  push:
    branches: ['**']
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run tests
        id: test
        # Default Actions bash runs with `-eo pipefail`, so a mvn failure through the
        # tee still fails the step (and the branch's check).
        run: mvn -B -ntp test 2>&1 | tee test-output.log

      - name: Test summary
        if: always()
        run: |
          {
            echo "## Tests — \`${GITHUB_REF_NAME}\` @ \`${GITHUB_SHA::7}\`"
            echo ""
            echo '```'
            grep -E "Tests run: [0-9]+, Failures: [0-9]+, Errors: [0-9]+" test-output.log | tail -1 \
              || echo "no aggregate line (build likely failed before tests ran — see log)"
            echo '```'
            if grep -qiE "BUILD FAILURE|<<< FAILURE|<<< ERROR" test-output.log; then
              echo ""
              echo "### Failures / errors"
              echo '```'
              grep -iE "<<< FAILURE|<<< ERROR|BUILD FAILURE|^\[ERROR\]|Tests run:.*Failures: [1-9]|Tests run:.*Errors: [1-9]" \
                test-output.log | head -60
              echo '```'
            else
              echo ""
              echo "✅ all green"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # run_id keeps the name valid for branch names containing "/".
          name: surefire-reports-${{ github.run_id }}
          path: '**/target/surefire-reports/**'
          if-no-files-found: ignore
          retention-days: 14
