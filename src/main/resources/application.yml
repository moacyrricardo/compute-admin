# compute-admin base configuration (spec-001).
server:
  # Tomcat stops accepting new connections and drains in-flight requests — including
  # the RunRS SSE output stream — before the context tears down (spec-016).
  shutdown: graceful
spring:
  # Bound how long each shutdown phase waits for in-flight work to drain. Kept above
  # the run pool's ca.run.shutdown-await-seconds (default 20s) so the run drain
  # completes within the phase (spec-016).
  lifecycle:
    timeout-per-shutdown-phase: 25s
  application:
    name: compute-admin
  # Optional local secrets file (never committed).
  config:
    import: optional:file:./.env[.properties]
  datasource:
    url: jdbc:h2:file:./data/compute-admin;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      # Flyway owns the schema. Envers uses the validity audit strategy (REV +
      # REVEND on each _aud table) per ARCH.md, so every audited row carries its
      # own validity interval; the hand-written _aud migrations add the REVEND
      # column + FK to revinfo.
      org.hibernate.envers.audit_strategy: org.hibernate.envers.strategy.internal.ValidityAuditStrategy
      org.hibernate.envers.audit_table_suffix: _aud
      org.hibernate.envers.store_data_at_delete: true
  flyway:
    enabled: true

ca:
  # Filtered by the Maven resources plugin (spring-boot-starter-parent uses the
  # @...@ delimiter) so the packaged jar reports the real build version. Falls
  # back to the @Value default ("dev") for unfiltered IDE runs.
  version: '@project.version@'
