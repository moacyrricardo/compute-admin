<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>compute-admin</title>
  <!-- spec-012: static JSON-driven shell. No framework, no build step. -->
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <!-- Full-screen login (no shell). Shown by app.js when there is no session. -->
  <div id="login-root" class="hidden"></div>

  <!-- The application shell: brand, nav, top bar, and the routed view region.
       app.js fills #view per the hash route and toggles .hidden on the roots. -->
  <div id="shell-root" class="shell hidden">
    <div class="brand">
      <span class="dot" aria-hidden="true"></span>
      <span>compute-admin</span>
    </div>

    <header class="topbar">
      <div class="userbox">
        <span id="user-name"></span>
        <span id="user-email" class="email"></span>
        <button id="sign-out" class="btn btn--sm" type="button">Sign out</button>
      </div>
    </header>

    <nav class="nav" aria-label="Primary">
      <a href="#/machines" data-nav="machines">Machines</a>
      <a href="#/blueprints" data-nav="blueprints">Blueprints</a>
      <a href="#/runs" data-nav="runs">Runs</a>
      <a href="#/mcp" data-nav="mcp">MCP surface</a>
      <a href="#/tokens" data-nav="tokens">Tokens</a>
      <a href="#/appkey" data-nav="appkey">App key</a>
    </nav>

    <main id="view" class="view" tabindex="-1"></main>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script src="app.js"></script>
</body>
</html>
