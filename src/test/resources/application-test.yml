# compute-admin test profile (spec-001).
# Isolates full-context *WebTests from the file-based dev datasource declared in
# application.yml (jdbc:h2:file:./data/compute-admin;AUTO_SERVER=TRUE) by pointing
# them at an in-memory H2 instead, so a test run neither creates nor pollutes
# ./data/compute-admin and stays hermetic and repeatable. This is the skeleton
# every later *WebTest inherits: activate it with @ActiveProfiles("test"). The rest
# of the base config (Flyway, JPA, Envers) still applies unchanged.
spring:
  datasource:
    url: jdbc:h2:mem:compute-admin-test;DB_CLOSE_DELAY=-1
  # Bound context teardown so the test JVM exits promptly. At JVM shutdown Spring
  # closes every cached @SpringBootTest context; Tomcat's graceful-shutdown phase
  # would otherwise wait the 30s default `timeout-per-shutdown-phase` for any
  # still-open async request (e.g. an SSE output stream a *WebTest left draining),
  # which manifests as Surefire force-killing the fork ("kill self fork JVM ...
  # 30 seconds after System.exit(0)") and adds ~30s of dead time to every build.
  # Tests assert on responses already received, so nothing needs the grace period.
  lifecycle:
    timeout-per-shutdown-phase: 1s

ca:
  # Keep the generated app SSH keypair (spec-003) out of ./data during tests.
  ssh:
    key-path: ./target/test-ssh/id_ed25519
  run:
    # Bound the run pool's shutdown drain (spec-016) to 1s in tests, matching the
    # tightened lifecycle phase above, so closing a cached context never waits the
    # 20s production default on a stray in-flight run.
    shutdown-await-seconds: 1
